<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Dev Card Generator - Final Production</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- React & Framer Motion CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --bg-color: #0d1117;
            --bg-gradient: radial-gradient(circle at center, #1a1f26 0%, #0d1117 100%);
            --container-bg: #161b22;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --accent-color: #f0f6fc;
            --accent-hover: #ffffff;
            --border-color: #30363d;
            
            /* Metallic Tiers Base Colors */
            --tier-legendary: #ffd700;
            --tier-epic: #c084fc;
            --tier-rare: #60a5fa;
            --tier-uncommon: #4ade80;
            --tier-common: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            margin: 0;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; perspective: 2500px;
        }

        .app-container {
            width: 100%; max-width: 600px; text-align: center;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Master centering logic */
        }

        .view {
            display: flex; flex-direction: column; align-items: center;
            animation: fadeIn 0.5s ease-out forwards;
            width: 100%;
        }

        /* Loading Animation: Base Styling (Motion-driven) */
        .loading-container { margin-top: 20px; }
        .pulse-loader { 
            width: 60px; height: 60px; 
            background-color: #fff; border-radius: 50%; 
            margin: 0 auto 30px; 
        }

        /* Results Centering Container: Perfect Vertical Balance */
        .results-view {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 48px;
            padding: 64px 0;
            box-sizing: border-box;
            width: 100%;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2.5rem; font-weight: 800; margin-bottom: 10px; letter-spacing: -1px;
            background: linear-gradient(180deg, #fff 0%, #8b949e 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .subheading { color: var(--text-secondary); margin-bottom: 40px; font-size: 1.1rem; }

        .input-group {
            display: flex; gap: 10px; background: rgba(22, 27, 34, 0.8);
            backdrop-filter: blur(10px); padding: 10px; border-radius: 16px;
            border: 1px solid var(--border-color); box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            width: 100%; max-width: 450px; margin: 0 auto;
        }

        input {
            flex: 1; background: transparent; border: none; color: var(--text-primary);
            padding: 12px 16px; font-size: 1rem; outline: none;
        }
        input::placeholder { color: #484f58; }

        button.primary-btn {
            background-color: #fff; color: #000; border: none; padding: 12px 24px;
            border-radius: 12px; font-weight: 700; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        button.primary-btn:hover {
            background-color: #e2e8f0; transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .dynamic-tier-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            animation: tierFadeIn 1.2s ease-out 1.2s forwards;
            opacity: 0;
        }
        .header-main-title {
            font-size: 2.2rem; font-weight: 800; letter-spacing: 6px; 
            text-transform: uppercase;
            line-height: 1;
        }
        .header-sub-title {
            font-size: 0.95rem; font-weight: 700; letter-spacing: 4px;
            opacity: 0.7; text-transform: uppercase;
            margin-top: 4px;
        }

        @keyframes tierFadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-container {
            width: 100%; display: flex; justify-content: center;
            perspective: 2500px;
        }

        .trading-card {
            width: 360px; height: 500px; background: #000;
            border: 14px solid #fff; border-radius: 32px; position: relative;
            box-shadow: 0 40px 80px rgba(0,0,0,0.9);
            transform-style: preserve-3d;
            overflow: hidden;
        }

        .card-entrance {
            animation: tcgReveal 2.2s cubic-bezier(0.1, 0.9, 0.2, 1) forwards;
            transform-origin: center center;
        }

        @keyframes tcgReveal {
            0% { opacity: 1; transform: scale(0.4) rotateY(-720deg) rotateX(30deg) translateZ(-800px); filter: brightness(3) blur(15px); }
            15% { filter: brightness(1.5) blur(5px); transform: scale(0.6) rotateY(-360deg) rotateX(-15deg) translateZ(0); }
            100% { transform: scale(1) rotateY(0deg) rotateX(0deg) translateZ(0); filter: brightness(1) blur(0px); }
        }

        .card-layers {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1;
            border-radius: 20px; overflow: hidden;
        }
        .layer-base { position: absolute; inset: 0; transition: background 0.5s ease; box-shadow: inset 0 0 120px rgba(255,255,255,0.08); }
        .layer-pattern { position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px); background-size: 32px 32px; opacity: 0.8; }
        .glare-flash { position: absolute; inset: -100%; background: linear-gradient(110deg, transparent 40%, rgba(255,255,255,0.8) 50%, transparent 60%); z-index: 5; animation: tcgFlash 2.2s cubic-bezier(0.1, 0.9, 0.2, 1) forwards; pointer-events: none; }
        @keyframes tcgFlash { 0% { transform: translateX(-100%) rotate(25deg); opacity: 0; } 10% { opacity: 1; } 30% { transform: translateX(100%) rotate(25deg); opacity: 0; } 100% { transform: translateX(100%) rotate(25deg); opacity: 0; } }
        .glare-spotlight { position: absolute; inset: 0; background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(255,255,255,0.4) 0%, transparent 60%); z-index: 4; mix-blend-mode: overlay; transition: opacity 0.5s ease; pointer-events: none; }

        /* Diagonal Foil Shine Sweep: Post-Reveal Polish */
        .foil-sweep {
            position: absolute;
            inset: -100%;
            background: linear-gradient(
                110deg,
                transparent 35%,
                rgba(255, 255, 255, 0.1) 42%,
                rgba(255, 255, 255, 0.6) 45%,
                rgba(255, 255, 255, 0.1) 48%,
                transparent 55%
            );
            z-index: 6;
            pointer-events: none;
            opacity: 0;
            transform: translateX(-100%) rotate(25deg);
            animation: foilShine 1.4s cubic-bezier(0.4, 0, 0.2, 1) 1.2s forwards;
        }

        @keyframes foilShine {
            0% { transform: translateX(-100%) rotate(25deg); opacity: 0; }
            20% { opacity: 0.8; }
            80% { opacity: 0.8; }
            100% { transform: translateX(100%) rotate(25deg); opacity: 0; }
        }

        .card-content {
            position: relative; z-index: 10; padding: 22px 22px 48px 22px; height: 100%;
            display: flex; flex-direction: column; color: #fff;
            text-shadow: 0 2px 10px rgba(0,0,0,1); transform-style: preserve-3d;
        }

        .card-header-compact { 
            display: flex; align-items: center; gap: 16px; 
            margin-bottom: 20px; padding: 14px 16px; 
            background: rgba(255,255,255,0.05); backdrop-filter: blur(12px);
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.15); 
        }
        .header-content { display: flex; flex-direction: column; justify-content: center; gap: 4px; }
        .profile-pic { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #fff; box-shadow: 0 0 20px rgba(255,255,255,0.3); flex-shrink: 0; }
        .username-label { font-weight: 800; font-size: 1.25rem; color: #fff; letter-spacing: -0.5px; line-height: 1; }
        .stats-row { font-size: 0.7rem; font-weight: 800; opacity: 0.9; text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; gap: 6px; }

        .repos-section-expanded { flex-grow: 1; padding: 0 10px; margin-bottom: 4px; }
        .section-title { 
            font-size: 0.7rem; font-weight: 800; color: rgba(255,255,255,0.5); 
            text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.15); margin-bottom: 16px; padding-bottom: 8px;
            letter-spacing: 2px;
        }
        .repo-item { margin-bottom: 18px; }
        .repo-name { font-weight: 800; font-size: 1rem; color: #fff; margin-bottom: 4px; }
        .repo-desc { font-size: 0.75rem; color: rgba(255,255,255,0.6); line-height: 1.4; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .repo-stars { font-size: 0.75rem; font-weight: 800; opacity: 0.9; color: #fff; }

        .stack-footer-expanded { padding: 0 10px; margin-bottom: 18px; }
        .stack-list { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-start; }
        .stack-tag { background: #fff; color: #000; padding: 4px 12px; border-radius: 6px; font-weight: 800; font-size: 0.65rem; text-transform: uppercase; box-shadow: 0 4px 10px rgba(255,255,255,0.1); white-space: nowrap; }

        .card-anchor-footer { 
            margin-top: auto; display: flex; align-items: flex-end; padding: 0 10px; opacity: 0.5;
            position: relative; height: 32px;
        }
        .auth-stamp { font-size: 0.6rem; font-weight: 800; letter-spacing: 2px; line-height: 1; }
        .rarity-icon { 
            font-size: 1.8rem; 
            position: absolute;
            bottom: -10px; right: 0px; line-height: 1;
        }

        .reset-btn { background: transparent; border: 1px solid var(--border-color); color: var(--text-secondary); cursor: pointer; }
        .reset-btn:hover { background: #21262d; color: var(--text-primary); }

        .loading-container { margin-top: 20px; }
        .pulse-loader { width: 60px; height: 60px; background-color: #fff; border-radius: 50%; animation: pulse 1.5s ease-in-out infinite; margin: 0 auto 20px; box-shadow: 0 0 30px rgba(255, 255, 255, 0.3); }

    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, useMotionValue, useTransform, useSpring } = window.Motion;

        // --- PRODUCTION CONFIGURATION ---
        const USE_MOCK_DATA = false; 

        const MOCK_DATA = {
            username: "hologram-architect",
            name: "Silas Vane",
            avatar: "https://i.pravatar.cc/150?u=hologram-architect",
            followers: 1840,
            publicRepos: 64,
            totalStars: 4250,
            totalForks: 412,
            primaryLang: "Rust",
            skills: ["Rust", "TypeScript", "WebGPU", "C++", "Three.js", "React", "Python"],
            repos: [
                { name: "BackTrack", stars: 4200, desc: "A high-performance system monitoring tool for hyper-scaling cloud environments." },
                { name: "quantum-render-core", stars: 1240, desc: "A distributed path-tracing engine leveraging hardware-accelerated ray tracing." }
            ]
        };

        let BACKEND_URL = '${BACKEND_URL}';
        if (BACKEND_URL.startsWith('$') || !BACKEND_URL) {
            BACKEND_URL = 'http://localhost:8080';
        }

        const calculateRarityTier = (followers, stars, repos, forks) => {
            if (followers > 1000 || stars > 3000) return "Legendary";
            if (followers > 500 || stars > 1000) return "Epic";
            if (followers > 100 || stars > 300) return "Rare";
            if (followers > 30 || repos > 50) return "Uncommon";
            return "Common";
        }

        const formatNum = (num) => num >= 1000 ? (num / 1000).toFixed(1) + 'k' : num;

        const DevCard = ({ data, isHovering, setIsHovering, mousePos, setMousePos, rotateX, rotateY }) => {
            const [isEntering, setIsEntering] = useState(true);
            useEffect(() => {
                const timer = setTimeout(() => setIsEntering(false), 2200);
                return () => clearTimeout(timer);
            }, []);

            const handleMouseMove = (e) => {
                if (isEntering) return;
                const rect = e.currentTarget.getBoundingClientRect();
                const width = rect.width;
                const height = rect.height;
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                setMousePos({ x: (mouseX / width) * 100, y: (mouseY / height) * 100, rawX: mouseX / width - 0.5, rawY: mouseY / height - 0.5 });
            };

            const tierStyles = {
                "Legendary": { accent: "#ffd700", bg: "linear-gradient(135deg, #b8860b 0%, #453500 100%)" },
                "Epic": { accent: "#c084fc", bg: "linear-gradient(135deg, #581c87 0%, #2e1065 100%)" },
                "Rare": { accent: "#60a5fa", bg: "linear-gradient(135deg, #1e3a8a 0%, #172554 100%)" },
                "Uncommon": { accent: "#4ade80", bg: "linear-gradient(135deg, #065f46 0%, #022c22 100%)" },
                "Common": { accent: "#ffffff", bg: "linear-gradient(135deg, #334155 0%, #0f172a 100%)" }
            };
            const currentStyle = tierStyles[data.tier] || tierStyles["Common"];

            return (
                <div className="card-container">
                    <motion.div 
                        className="trading-card card-entrance"
                        onMouseMove={handleMouseMove}
                        onMouseLeave={() => setIsHovering(false)}
                        onMouseEnter={() => !isEntering && setIsHovering(true)}
                        style={{ rotateX, rotateY, "--mouse-x": `${mousePos.x}%`, "--mouse-y": `${mousePos.y}%` }}
                    >
                        <div className="card-layers">
                            <div className="layer-base" style={{ background: currentStyle.bg }}></div>
                            <div className="layer-pattern"></div>
                            <div className="glare-flash"></div>
                            <div className="foil-sweep"></div>
                            <div className="glare-spotlight" style={{ opacity: isHovering ? 1 : 0 }}></div>
                        </div>
                        <div className="card-content">
                            <div className="card-header-compact" style={{ transform: "translateZ(40px)" }}>
                                <img src={data.avatar} className="profile-pic" alt="Avatar" />
                                <div className="header-content">
                                    <div className="username-label">{data.username}</div>
                                    <div className="stats-row">
                                        <span>{formatNum(data.followers)} FLW</span>
                                        <span style={{ opacity: 0.4 }}>•</span>
                                        <span>{formatNum(data.totalStars)} STR</span>
                                    </div>
                                </div>
                            </div>
                            <div className="repos-section-expanded" style={{ transform: "translateZ(30px)" }}>
                                <div className="section-title">Latest Repositories</div>
                                {data.repos.slice(0, 2).map((r, i) => (
                                    <div className="repo-item" key={i}>
                                        <div className="repo-name">{r.name}</div>
                                        <div className="repo-desc">{r.desc}</div>
                                        <div className="repo-stars">⭐ {r.stars} STARS</div>
                                    </div>
                                ))}
                            </div>
                            <div className="stack-footer-expanded" style={{ transform: "translateZ(25px)" }}>
                                <div className="section-title">Top Stack</div>
                                <div className="stack-list">
                                    {data.skills.slice(0, 3).map((s, i) => (
                                        <span className="stack-tag" key={i}>{s}</span>
                                    ))}
                                </div>
                            </div>
                            <div className="card-anchor-footer" style={{ transform: "translateZ(20px)" }}>
                                <div className="auth-stamp">{data.publicRepos} REPOS / {data.totalForks} FORKS</div>
                                <div className="rarity-icon" style={{ color: currentStyle.accent }}>✧</div>
                            </div>
                        </div>
                    </motion.div>
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState('input');
            const [username, setUsername] = useState('');
            const [cardData, setCardData] = useState(null);

            // Physics State
            const x = useMotionValue(0);
            const y = useMotionValue(0);
            const mouseXSpring = useSpring(x, { stiffness: 300, damping: 20 });
            const mouseYSpring = useSpring(y, { stiffness: 300, damping: 20 });
            const rotateX = useTransform(mouseYSpring, [-0.5, 0.5], [8, -8]);
            const rotateY = useTransform(mouseXSpring, [-0.5, 0.5], [-8, 8]);
            const [isHovering, setIsHovering] = useState(false);
            const [mousePos, setMousePos] = useState({ x: 50, y: 50, rawX: 0, rawY: 0 });

            useEffect(() => {
                x.set(mousePos.rawX);
                y.set(mousePos.rawY);
                if (!isHovering) { x.set(0); y.set(0); }
            }, [mousePos, isHovering]);

            const processGeneration = async () => {
                const targetUsername = username.trim();
                if (!targetUsername && !USE_MOCK_DATA) return;
                setView('loading');

                if (USE_MOCK_DATA) {
                    setTimeout(() => {
                        const data = { ...MOCK_DATA };
                        data.tier = calculateRarityTier(data.followers, data.totalStars, data.publicRepos, data.totalForks);
                        setCardData(data);
                        setView('results');
                    }, 800);
                    return;
                }

                try {
                    const response = await fetch(`${BACKEND_URL}/generate`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: targetUsername }) });
                    if (!response.ok) throw new Error("Generation failed.");

                    const cardResp = await fetch(`${BACKEND_URL}/card/${targetUsername}`);
                    const cardHtml = await cardResp.text();
                    const doc = new DOMParser().parseFromString(cardHtml, 'text/html');
                    
                    const getCleanNum = (id) => {
                        const el = doc.getElementById(id);
                        if (!el) return 0;
                        const clean = el.innerText.replace(/[^0-9]/g, '');
                        return parseInt(clean) || 0;
                    };

                    const hiddenStats = doc.getElementById('hidden-stats');
                    const followers = getCleanNum('stat-followers');
                    const publicRepos = getCleanNum('stat-repos');
                    const totalStars = parseInt(hiddenStats?.getAttribute('data-total-stars')) || 0;
                    const totalForks = parseInt(hiddenStats?.getAttribute('data-total-forks')) || 0;

                    const realData = {
                        username: targetUsername,
                        avatar: doc.querySelector('img')?.src || `https://github.com/${targetUsername}.png`,
                        followers,
                        publicRepos,
                        totalStars,
                        totalForks,
                        skills: Array.from(doc.querySelectorAll('.badge')).map(el => el.innerText),
                        repos: Array.from(doc.querySelectorAll('#repos-container > div')).map(el => ({
                            name: el.querySelector('strong')?.innerText || "Repo",
                            desc: el.querySelector('small')?.innerText || "",
                            stars: parseInt(el.innerText.match(/⭐(\d+)/)?.[1]) || 0
                        }))
                    };
                    
                    realData.tier = calculateRarityTier(realData.followers, realData.totalStars, realData.publicRepos, realData.totalForks);
                    setCardData(realData);
                    setView('results');
                } catch (err) {
                    console.error(err);
                    setView('input');
                }
            };

            const tierColors = { "Legendary": "#ffd700", "Epic": "#c084fc", "Rare": "#60a5fa", "Uncommon": "#4ade80", "Common": "#ffffff" };
            const tierColor = cardData ? (tierColors[cardData.tier] || tierColors["Common"]) : tierColors["Common"];

            return (
                <div className="app-container">
                    {view === 'input' && (
                        <div className="view">
                            <div style={{ marginBottom: '24px' }}>
                                <h1 style={{ fontSize: '3.2rem', marginBottom: '0', lineHeight: '1' }}>GitHub</h1>
                                <h1 style={{ fontSize: '1.8rem', marginTop: '8px', opacity: 0.8, letterSpacing: '2px' }}>Developer Card Generator</h1>
                            </div>
                            <div className="input-group">
                                <input type="text" value={username} onChange={(e) => setUsername(e.target.value)} placeholder="GitHub Username" onKeyPress={(e) => e.key === 'Enter' && processGeneration()} />
                                <button className="primary-btn" onClick={processGeneration}>Generate Card</button>
                            </div>
                        </div>
                    )}
                    {view === 'loading' && (
                        <div className="view">
                            <div className="loading-container">
                                <motion.div 
                                    className="pulse-loader"
                                    animate={{ 
                                        scale: [1, 1.2, 1],
                                        opacity: [0.6, 1, 0.6],
                                        boxShadow: [
                                            "0 0 20px rgba(255, 255, 255, 0.2)",
                                            "0 0 60px rgba(255, 255, 255, 0.6)",
                                            "0 0 20px rgba(255, 255, 255, 0.2)"
                                        ]
                                    }}
                                    transition={{ 
                                        duration: 1.2, 
                                        repeat: Infinity, 
                                        ease: "easeInOut" 
                                    }}
                                />
                                <p className="subheading" style={{ fontSize: '2rem', letterSpacing: '4px' }}>...</p>
                            </div>
                        </div>
                    )}
                    {view === 'results' && cardData && (
                        <div className="view results-view" style={{ minHeight: '100vh', justifyContent: 'center' }}>
                            <div className="dynamic-tier-header" style={{ color: tierColor }}>
                                <div className="header-main-title">CARD REVEALED</div>
                                <div className="header-sub-title">{cardData.tier} Card</div>
                            </div>
                            <DevCard data={cardData} isHovering={isHovering} setIsHovering={setIsHovering} mousePos={mousePos} setMousePos={setMousePos} rotateX={rotateX} rotateY={rotateY} />
                            <button className="primary-btn reset-btn" onClick={() => { setCardData(null); setView('input'); }}>Mint Another</button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
