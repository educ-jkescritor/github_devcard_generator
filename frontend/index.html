<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Dev Card Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --container-bg: #161b22;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --accent-color: #238636;
            --accent-hover: #2ea043;
            --error-color: #f85149;
            --border-color: #30363d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .main-container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        p.subheading {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 40px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: var(--container-bg);
            padding: 10px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            padding: 12px 16px;
            font-size: 1rem;
            outline: none;
        }

        input::placeholder {
            color: #484f58;
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(35, 134, 54, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        /* Result Area */
        #result-container {
            margin-top: 20px;
            display: none;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.6s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #card-render {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .share-btn {
            margin-top: 20px;
            background: #21262d;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .share-btn:hover {
            background: #30363d;
            box-shadow: none;
        }

        /* Loading Skeleton */
        #loading-skeleton {
            display: none;
            width: 400px;
            height: 350px;
            background: var(--container-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            padding: 20px;
            margin: 0 auto;
        }

        .skeleton-item {
            background: linear-gradient(90deg, #21262d 25%, #30363d 50%, #21262d 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
            border-radius: 4px;
        }

        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-header { display: flex; align-items: center; margin-bottom: 20px; }
        .skeleton-avatar { width: 60px; height: 60px; border-radius: 50%; margin-right: 15px; }
        .skeleton-title { width: 150px; height: 20px; margin-bottom: 8px; }
        .skeleton-subtitle { width: 100px; height: 14px; }
        .skeleton-line { width: 100%; height: 12px; margin-bottom: 10px; }
        .skeleton-stats { display: flex; justify-content: space-between; margin-top: 20px; }
        .skeleton-stat { width: 60px; height: 20px; }

        /* Error state */
        #error-message {
            display: none;
            color: var(--error-color);
            background: rgba(248, 81, 73, 0.1);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(248, 81, 73, 0.2);
            margin-top: 20px;
        }

        .copy-toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent-color);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <h1>GitHub Dev Card Generator</h1>
        <p class="subheading">Enter any public GitHub username</p>

        <div class="input-group">
            <input type="text" id="username" placeholder="e.g. torvalds" spellcheck="false" autocomplete="off">
            <button id="generate-btn" onclick="generateCard()">
                <span id="btn-text">Generate Card</span>
            </button>
        </div>

        <!-- Loading Skeleton -->
        <div id="loading-skeleton">
            <div class="skeleton-header">
                <div class="skeleton-item skeleton-avatar"></div>
                <div>
                    <div class="skeleton-item skeleton-title"></div>
                    <div class="skeleton-item skeleton-subtitle"></div>
                </div>
            </div>
            <div class="skeleton-item skeleton-line"></div>
            <div class="skeleton-item skeleton-line"></div>
            <div class="skeleton-item skeleton-line" style="width: 80%;"></div>
            <div class="skeleton-stats">
                <div class="skeleton-item skeleton-stat"></div>
                <div class="skeleton-item skeleton-stat"></div>
                <div class="skeleton-item skeleton-stat"></div>
            </div>
        </div>

        <!-- Error Message -->
        <div id="error-message"></div>

        <!-- Result Container -->
        <div id="result-container">
            <div id="card-render"></div>
            <button class="share-btn" onclick="copyUrl()">
                Share Card URL
            </button>
        </div>
    </div>

    <div id="toast" class="copy-toast">Copied to clipboard!</div>

    <script>
        // Fallback for BACKEND_URL if not replaced by envsubst
        let BACKEND_URL = '${BACKEND_URL}';
        if (BACKEND_URL.startsWith('$') || !BACKEND_URL) {
            // Try to auto-detect
            if (window.location.protocol === 'file:') {
                // If opened as a local file, default to localhost
                BACKEND_URL = 'http://localhost:8080';
            } else if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
                BACKEND_URL = 'http://localhost:8080';
            } else {
                BACKEND_URL = window.location.protocol + "//" + window.location.hostname + ":8080";
            }
        }

        console.log("Using BACKEND_URL:", BACKEND_URL);

        let lastCardUrl = "";

        async function generateCard() {
            const usernameInput = document.getElementById('username');
            const username = usernameInput.value.trim();
            if (!username) return;

            const btn = document.getElementById('generate-btn');
            const skeleton = document.getElementById('loading-skeleton');
            const result = document.getElementById('result-container');
            const error = document.getElementById('error-message');
            const renderArea = document.getElementById('card-render');

            // Reset UI
            btn.disabled = true;
            document.getElementById('btn-text').innerText = "Generating...";
            error.style.display = "none";
            result.style.display = "none";
            skeleton.style.display = "block";

            try {
                console.log(`Fetching ${BACKEND_URL}/generate for user ${username}`);
                const response = await fetch(`${BACKEND_URL}/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username })
                }).catch(err => {
                    console.error("Fetch error:", err);
                    throw new Error(`Cannot reach backend at ${BACKEND_URL}. <br><br><b>Is the backend running?</b><br>Please run <code>python main.py</code> in the backend folder.`);
                });

                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.detail || "Failed to generate card");
                }

                const data = await response.json();
                
                // Fetch the actual saved HTML card to render it inline
                const cardResp = await fetch(`${BACKEND_URL}/card/${username}`);
                if (!cardResp.ok) throw new Error("Card generated but failed to retrieve preview.");
                
                const cardHtml = await cardResp.text();

                // Extract only the inner dev-card div from the full HTML doc
                const parser = new DOMParser();
                const doc = parser.parseFromString(cardHtml, 'text/html');
                const devCard = doc.querySelector('.dev-card');

                renderArea.innerHTML = devCard ? devCard.outerHTML : cardHtml;
                lastCardUrl = `${BACKEND_URL}${data.card_url}`;
                
                skeleton.style.display = "none";
                result.style.display = "flex";
            } catch (err) {
                console.error("App Error:", err);
                skeleton.style.display = "none";
                error.innerText = err.message;
                error.style.display = "block";
            } finally {
                btn.disabled = false;
                document.getElementById('btn-text').innerText = "Generate Card";
            }
        }

        function copyUrl() {
            if (!lastCardUrl) return;
            navigator.clipboard.writeText(lastCardUrl);
            
            const toast = document.getElementById('toast');
            toast.style.display = "block";
            setTimeout(() => { toast.style.display = "none"; }, 2000);
        }

        // Support Enter key
        document.getElementById('username').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') generateCard();
        });
    </script>
</body>
</html>
